name: tutorial1

on:
  push:
    branches:
      - Dev

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: echo "I am job 1"
      - run: echo "Today's date is:"
      - run: date
      - run: python --version
      - run: pip --version

  job2:
    runs-on: ubuntu-latest
    steps:
      - run: echo "I am job 2"
      - run: echo "Today's date is:"
      - run: date

  job3:
    runs-on: ubuntu-latest
    steps:
      - run: echo "I am job 3"
      - run: echo "Today's date is:"
      - run: date

  job4:
    needs: [job1, job2]
    runs-on: ubuntu-latest
    steps:
      - run: echo "I am job 4"
      - run: echo "Today's date is:"
      - run: date